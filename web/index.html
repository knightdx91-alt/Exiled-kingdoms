<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Exiled Kingdoms — Web</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0b0d10" />
  <link rel="icon" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <div id="game-root"></div>

  <!-- All DOM game overlays (HUD, dialogue, joystick, character creation) live in
       here so they rotate together with the game when an orientation is chosen.
       The Phaser canvas stays in #game-root (axis-aligned) so pointer input works. -->
  <div id="overlay-root"></div>

  <!-- Settings: the gear opens a panel holding orientation + movement controls, so
       they aren't always on screen. The gear/panel stay fixed and upright. -->
  <button id="settings-btn" title="Settings" aria-label="Settings">⚙</button>
  <div id="settings-panel" hidden>
    <div class="set-title">Settings</div>

    <div class="set-group" role="group" aria-label="Screen orientation">
      <div class="set-label">Orientation</div>
      <div class="set-row" id="orient-bar">
        <button data-orient="0"   title="Portrait">▯</button>
        <button data-orient="90"  title="Landscape">▭</button>
        <button data-orient="180" title="Reverse portrait">▯⤵</button>
        <button data-orient="270" title="Reverse landscape">▭⤴</button>
      </div>
    </div>

    <div class="set-group" role="group" aria-label="Movement control">
      <div class="set-label">Movement</div>
      <div class="set-row" id="control-bar">
        <button data-control="tap"      title="Tap to move">👆 Tap</button>
        <button data-control="joystick" title="Free-floating joystick">🕹 Joystick</button>
      </div>
    </div>

    <div class="set-group" role="group" aria-label="Combat">
      <div class="set-label">Combat</div>
      <label class="set-check"><input type="checkbox" id="set-attackinteracts"> Attack button also interacts</label>
      <label class="set-check"><input type="checkbox" id="set-shownumbers"> Show numbers on bars</label>
    </div>

    <div class="set-group" role="group" aria-label="Performance">
      <div class="set-label">Performance</div>
      <label class="set-check"><input type="checkbox" id="set-showperf"> Show FPS / diagnostics</label>
    </div>

    <button id="settings-close" class="set-close">Close</button>
  </div>

  <!-- Visible build tag so you can tell whether a fresh copy loaded. -->
  <div id="ek-build">v23</div>

  <script src="vendor/phaser.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>

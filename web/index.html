<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Exiled Kingdoms — Web</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0b0d10" />
  <link rel="icon" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <div id="game-root"></div>

  <!-- Player-owned orientation control (does NOT rely on the browser's auto-rotate) -->
  <div id="orient-bar" role="group" aria-label="Screen orientation">
    <button data-orient="auto" title="Auto — follow device">🔄</button>
    <button data-orient="0"   title="Lock portrait">▯</button>
    <button data-orient="90"  title="Lock landscape">▭</button>
    <button data-orient="180" title="Lock reverse portrait">▯⤵</button>
    <button data-orient="270" title="Lock reverse landscape">▭⤴</button>
  </div>

  <!-- Movement control toggle: tap-to-move vs free-floating joystick -->
  <button id="control-toggle" title="Toggle movement control">👆 Tap</button>

  <script src="vendor/phaser.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
